<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkStrike - Admin Panel</title>
    <link rel="stylesheet" href="../static/css/admin.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="#">ThinkStrike Admin</a>
                <div class="navbar-nav ms-auto">
                    <span class="nav-item nav-link text-light">Welcome, {{admin_name}}</span>
                    <a class="nav-link" href="/logout">Logout</a>
                </div>
            </div>
        </nav>

        <div class="row mt-4">
            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5>Admin Tools</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a href="#users" class="list-group-item active" data-bs-toggle="tab">User Management</a>
                        <a href="#roles" class="list-group-item" data-bs-toggle="tab">Role Assignment</a>
                        <a href="#categories" class="list-group-item" data-bs-toggle="tab">Quiz Categories</a>
                        <a href="#analytics" class="list-group-item" data-bs-toggle="tab">System Analytics</a>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <div class="tab-content">
                    <!-- Users Tab -->
                    <div class="tab-pane active" id="users">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5>User Management</h5>
                                <button class="btn btn-primary" id="addUserBtn">Add User</button>
                            </div>
                            <div class="card-body">
                                <table class="table" id="usersTable">
                                    <thead>
                                        <tr>
                                            <th>Username</th>
                                            <th>Role</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="usersList">
                                        <!-- Populated by JavaScript -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Roles Tab -->
                    <div class="tab-pane" id="roles">
                        <div class="card">
                            <div class="card-header">
                                <h5>Role Assignment</h5>
                            </div>
                            <div class="card-body">
                                <form id="roleAssignmentForm">
                                    <div class="mb-3">
                                        <label>User</label>
                                        <select class="form-control" id="userSelect">
                                            <!-- Populated by JavaScript -->
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label>Role</label>
                                        <select class="form-control" id="roleSelect">
                                            <option value="admin">Admin</option>
                                            <option value="teacher">Teacher</option>
                                            <option value="student">Student</option>
                                        </select>
                                    </div>
                                    <button type="submit" class="btn btn-primary">Update Role</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Categories Tab -->
                    <div class="tab-pane" id="categories">
                        <!-- Quiz Categories Management -->
                    </div>

                    <!-- Analytics Tab -->
                    <div class="tab-pane" id="analytics">
                        <!-- System Analytics Dashboard -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal fade" id="addUserModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addUserForm">
                        <div class="mb-3">
                            <label>Username</label>
                            <input type="text" class="form-control" id="newUsername" required>
                        </div>
                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" class="form-control" id="newPassword" required>
                        </div>
                        <div class="mb-3">
                            <label>Role</label>
                            <select class="form-control" id="newRole">
                                <option value="student">Student</option>
                                <option value="teacher">Teacher</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveUserBtn">Save User</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/admin.js"></script>
</body>
</html>
