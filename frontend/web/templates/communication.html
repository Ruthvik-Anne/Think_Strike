<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkStrike - Teacher Communication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../static/css/communication.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Teacher List Sidebar -->
            <div class="col-md-4 col-lg-3 sidebar">
                <div class="sidebar-header">
                    <h4>Teachers</h4>
                    <div id="connectionStatus" class="status-indicator offline">
                        Connecting...
                    </div>
                </div>
                <div class="teacher-search">
                    <input type="text" class="form-control" placeholder="Search teachers...">
                </div>
                <div id="teacherList" class="teacher-list">
                    <!-- Teachers will be populated here -->
                </div>
            </div>

            <!-- Chat Area -->
            <div class="col-md-8 col-lg-9 chat-area">
                <div class="chat-header">
                    <div class="selected-teacher">
                        <img src="" alt="" class="teacher-avatar">
                        <div class="teacher-info">
                            <h5>Select a teacher</h5>
                            <small class="text-muted">Start a conversation</small>
                        </div>
                    </div>
                </div>

                <div id="chatMessages" class="chat-messages">
                    <!-- Messages will be populated here -->
                </div>

                <div class="chat-input">
                    <div class="input-group">
                        <button class="btn btn-outline-secondary" type="button" id="attachmentBtn">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <textarea id="messageInput" class="form-control" 
                                placeholder="Type your message..."></textarea>
                        <button class="btn btn-primary" type="button" id="sendMessageBtn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- File Attachment Modal -->
    <div class="modal fade" id="attachmentModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Attach File</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="file" class="form-control" id="fileInput">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="uploadBtn">Upload</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/messaging.js"></script>
</body>
</html>
