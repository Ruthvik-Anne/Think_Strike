<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkStrike - Quiz Creator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/quiz_creator.css">
</head>
<body class="bg-light">
    <div class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <i class="fas fa-brain"></i> ThinkStrike
                </a>
                <div class="navbar-nav ms-auto">
                    <span class="nav-item nav-link">Welcome, {{teacher_name}}</span>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="row">
                <!-- Left Panel - Source Material -->
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-file-alt"></i> Source Material
                            </h5>
                        </div>
                        <div class="card-body">
                            <div id="editor" style="height: 300px;">
                                <!-- Rich text editor will be initialized here -->
                            </div>
                            <div class="mt-3">
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Difficulty</label>
                                        <select class="form-select" id="difficultyLevel">
                                            <option value="easy">Easy</option>
                                            <option value="medium">Medium</option>
                                            <option value="hard">Hard</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Question Types</label>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" value="mcq" checked>
                                            <label class="form-check-label">Multiple Choice</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" value="true_false">
                                            <label class="form-check-label">True/False</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" value="short_answer">
                                            <label class="form-check-label">Short Answer</label>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Number of Questions</label>
                                        <input type="number" class="form-control" id="numQuestions" value="5" min="1" max="20">
                                    </div>
                                </div>
                                <button class="btn btn-primary mt-3" id="generateBtn">
                                    <i class="fas fa-magic"></i> Generate Questions
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Panel - Generated Questions -->
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-questions"></i> Generated Questions
                            </h5>
                        </div>
                        <div class="card-body">
                            <div id="questionsList" class="questions-container">
                                <!-- Generated questions will appear here -->
                            </div>
                            <div class="text-end mt-3">
                                <button class="btn btn-success" id="saveQuizBtn">
                                    <i class="fas fa-save"></i> Save Quiz
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Question Preview Modal -->
    <div class="modal fade" id="previewModal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Question Preview</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- Question preview content -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.min.js"></script>
    <script src="https://kit.fontawesome.com/your-kit-code.js"></script>
    <script src="../static/js/quiz_creator.js"></script>
</body>
</html>
